<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedNET - Roteirização Shopee</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow-x: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; position: fixed; top: 0; }
        .container { position: relative; z-index: 2; margin-top: 60vh; padding: 15px; max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #004a8d; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Botões Flutuantes de Rota */
        .rota-controls { position: fixed; top: 10px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; width: 150px; }
        .btn-rota-painel { background: #ff5722; font-size: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Overlays */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .btn-fechar { background: #666; margin-bottom: 15px; }
        .item-rota { background: #eee; margin: 10px 0; padding: 10px; border-radius: 8px; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .btn-add-rota { background: #ff9800; margin-top: 10px; }
        .btn-google { background: #4285F4; margin-top: 20px; font-size: 18px; padding: 20px; }
        
        .detalhes-header { border-bottom: 2px solid #004a8d; margin-bottom: 15px; padding-bottom: 10px; }
        .foto-detalhe { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

<div class="rota-controls">
    <button class="btn-rota-painel" onclick="abrirPainelRota()">🚚 ROTEIRIZAÇÃO (<span id="count-rota">0</span>)</button>
</div>

<div id="janela-rota" class="overlay">
    <button class="btn-fechar" onclick="fecharJanelas()">⬅ VOLTAR AO MAPA</button>
    <h2>📦 Minha Rota de Entrega</h2>
    <p style="font-size: 13px; color: #666;">Os pacotes abaixo serão ordenados do mais próximo para o mais distante de você.</p>
    <div id="lista-rota"></div>
    <button class="btn-google" onclick="gerarRotaGoogle()">🚀 INICIAR NO GOOGLE MAPS</button>
    <button style="background: #dc3545; margin-top: 10px;" onclick="limparRota()">LIMPAR LISTA</button>
</div>

<div id="janela-detalhes" class="overlay">
    <button class="btn-fechar" onclick="fecharJanelas()">⬅ VOLTAR</button>
    <div id="conteudo-detalhes"></div>
</div>

<div id="map"></div>

<div class="container">
    <div id="identificacao-area" class="card">
        <h3>ENTREGADOR</h3>
        <input type="text" id="nome-usuario" placeholder="Seu nome">
        <button onclick="acessarMapa()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="app-area" class="card" style="display:none;">
        <input type="text" id="nome-busca" placeholder="🔍 Buscar pacote/cliente..." oninput="filtrarMarcadores()">
        <hr>
        <h3 id="form-title">📍 Registrar Novo Ponto</h3>
        <input type="hidden" id="edit-id"><input type="hidden" id="edit-lat"><input type="hidden" id="edit-lng">
        <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
        <input type="tel" id="whats-cliente" placeholder="WhatsApp">
        <input type="text" id="rua-cliente" placeholder="Endereço">
        <button id="btn-acao" style="background:#25D366" onclick="salvarLocalizacao()">SALVAR LOCALIZAÇÃO</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Configuração do Firebase (Mantenha a sua existente)
    const firebaseConfig = { apiKey: "AIzaSyBuVx3VYGHF97hU9-CSLa-FmSbxFYIH20A", authDomain: "mapanisia.firebaseapp.com", projectId: "mapanisia", storageBucket: "mapanisia.firebasestorage.app", messagingSenderId: "429106374611", appId: "1:429106374611:web:b0fc107917f26bec3cb126" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const map = L.map('map').setView([-6.0886, -35.2111], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marcadoresAtivos = [];
    let minhaPosicao = { lat: -6.0886, lng: -35.2111 };
    let listaEntrega = JSON.parse(localStorage.getItem('rota_shopee') || "[]");

    atualizarContador();

    function acessarMapa() {
        const nome = document.getElementById('nome-usuario').value || localStorage.getItem('usuario_mapa');
        if (!nome) return alert("Digite seu nome!");
        localStorage.setItem('usuario_mapa', nome);
        document.getElementById('identificacao-area').style.display = 'none';
        document.getElementById('app-area').style.display = 'block';
        monitorarPosicao();
        carregarDados();
    }

    function monitorarPosicao() {
        navigator.geolocation.watchPosition(pos => {
            minhaPosicao = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        }, null, { enableHighAccuracy: true });
    }

    function abrirDetalhes(id) {
        db.collection("pontos").doc(id).get().then(doc => {
            const d = doc.data();
            const estaNaRota = listaEntrega.some(item => item.id === id);
            
            document.getElementById('conteudo-detalhes').innerHTML = `
                <div class="detalhes-header">
                    <h2>${d.nome}</h2>
                    <p>📍 ${d.rua || ''}</p>
                </div>
                ${estaNaRota ? '<p style="color:green">✅ Já está na sua lista de rota!</p>' : 
                `<button class="btn-add-rota" onclick="adicionarARota('${id}', '${d.nome}', ${d.lat}, ${d.lng})">➕ ADICIONAR À ROTA</button>`}
                <hr>
                <button class="btn-fechar" onclick="fecharJanelas()">VOLTAR AO MAPA</button>
            `;
            document.getElementById('janela-detalhes').style.display = 'block';
        });
    }

    function adicionarARota(id, nome, lat, lng) {
        if (listaEntrega.some(i => i.id === id)) return;
        listaEntrega.push({ id, nome, lat, lng });
        localStorage.setItem('rota_shopee', JSON.stringify(listaEntrega));
        atualizarContador();
        fecharJanelas();
        alert(nome + " adicionado à rota!");
    }

    function atualizarContador() {
        document.getElementById('count-rota').innerText = listaEntrega.length;
    }

    function abrirPainelRota() {
        if (listaEntrega.length === 0) return alert("Adicione pontos ao mapa primeiro clicando neles!");
        
        // CÁLCULO DE PROXIMIDADE (Ordenação)
        listaEntrega.sort((a, b) => {
            const distA = Math.hypot(a.lat - minhaPosicao.lat, a.lng - minhaPosicao.lng);
            const distB = Math.hypot(b.lat - minhaPosicao.lat, b.lng - minhaPosicao.lng);
            return distA - distB;
        });

        const listaDiv = document.getElementById('lista-rota');
        listaDiv.innerHTML = "";
        listaEntrega.forEach((item, index) => {
            listaDiv.innerHTML += `
                <div class="item-rota">
                    <span><strong>${index + 1}º</strong> - ${item.nome}</span>
                    <button style="width:auto; background:red; padding:5px" onclick="removerDaRota('${item.id}')">X</button>
                </div>
            `;
        });
        document.getElementById('janela-rota').style.display = 'block';
    }

    function removerDaRota(id) {
        listaEntrega = listaEntrega.filter(i => i.id !== id);
        localStorage.setItem('rota_shopee', JSON.stringify(listaEntrega));
        atualizarContador();
        abrirPainelRota();
    }

    function gerarRotaGoogle() {
        if (listaEntrega.length === 0) return;
        
        // Monta a URL multi-paradas do Google Maps
        // Formato: https://www.google.com/maps/dir/Origem/Parada1/Parada2/Destino
        let url = "https://www.google.com/maps/dir/My+Location/";
        listaEntrega.forEach(item => {
            url += `${item.lat},${item.lng}/`;
        });
        
        window.open(url, '_blank');
    }

    function limparRota() {
        if(confirm("Limpar toda a lista de entrega?")) {
            listaEntrega = [];
            localStorage.setItem('rota_shopee', "[]");
            atualizarContador();
            fecharJanelas();
        }
    }

    function fecharJanelas() {
        document.getElementById('janela-detalhes').style.display = 'none';
        document.getElementById('janela-rota').style.display = 'none';
    }

    function carregarDados() {
        db.collection("pontos").onSnapshot(snap => {
            marcadoresAtivos.forEach(m => map.removeLayer(m.marker));
            snap.forEach(doc => {
                const d = doc.data();
                const marker = L.marker([d.lat, d.lng]).addTo(map).on('click', () => abrirDetalhes(doc.id));
                marcadoresAtivos.push({ nome: d.nome.toLowerCase(), marker });
            });
        });
    }

    function filtrarMarcadores() {
        const busca = document.getElementById('nome-busca').value.toLowerCase();
        marcadoresAtivos.forEach(m => {
            if (m.nome.includes(busca)) { m.marker.addTo(map); } 
            else { map.removeLayer(m.marker); }
        });
    }

    async function salvarLocalizacao() {
        // Lógica de salvar simplificada para manter o foco na roteirização
        const nome = document.getElementById('nome-cliente').value;
        if (!nome) return alert("Nome obrigatório");
        navigator.geolocation.getCurrentPosition(async pos => {
            await db.collection("pontos").add({
                nome: nome, lat: pos.coords.latitude, lng: pos.coords.longitude,
                registrado_por: localStorage.getItem('usuario_mapa'), data: new Date()
            });
            alert("Salvo!");
            document.getElementById('nome-cliente').value = "";
        });
    }
</script>
</body>
</html>
