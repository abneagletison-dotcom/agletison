<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aGletison_app</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* MENU LATERAL */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #012a4a; color: white; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #013a63; text-align: center; border-bottom: 2px solid #ffc107; }
        .sidebar-footer { padding: 15px; background: #011627; border-top: 1px solid #ffc107; text-align: center; }
        .my-profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ffc107; object-fit: cover; }

        /* BOTÕES */
        .btn-menu { position: fixed; top: 15px; left: 15px; z-index: 5000; background: #012a4a; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 20px; }
        .btn-locate { position: fixed; bottom: 20px; right: 20px; z-index: 5000; background: white; color: #012a4a; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 11000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        input, button { width: 100%; padding: 14px; margin: 6px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-weight: bold; }
        
        .item-rota { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; color: #333; }
        .item-rota input { width: 20px; height: 20px; }
        
        .btn-save { background: #25D366; color: white; border: none; }
        .btn-route { background: #6f42c1; color: white; border: none; }
        .btn-google { background: #4285F4; color: white; border: none; }
        
        .foto-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin: 10px 0; display: none; border: 2px solid #012a4a; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header"><h2 style="color:#ffc107; margin:0;">aGletison_app</h2></div>
    <div style="flex:1; padding:10px;">
        <div onclick="irPara('mapa')" style="padding:15px; cursor:pointer;"><i class="fas fa-home"></i> Início</div>
        <div onclick="irPara('cadastro')" style="padding:15px; cursor:pointer;"><i class="fas fa-plus-circle"></i> Novo Cliente</div>
        <div onclick="abrirRoteirizacao()" style="padding:15px; cursor:pointer;"><i class="fas fa-route"></i> Criar Roteiro</div>
    </div>
    <div class="sidebar-footer">
        <img src="https://unavatar.io/instagram/Agletison" class="my-profile-img">
        <p style="margin:5px 0; font-weight:bold; color:#ffc107;">@Agletison</p>
        <button onclick="toggleMenu()" style="background:#cc0000; color:white; border:none; padding:5px;">Fechar</button>
    </div>
</div>

<button class="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<button class="btn-locate" onclick="centralizarEmMim()"><i class="fas fa-crosshairs"></i></button>

<div id="map"></div>

<div id="janela-rota" class="overlay">
    <button onclick="fecharOverlays()" style="background:#666; color:white;">⬅ VOLTAR</button>
    <h3>🚚 Selecione os Clientes da Rota</h3>
    <div id="lista-clientes-rota"></div>
    <div style="margin-top:20px;">
        <button class="btn-route" onclick="gerarRotaApp()"><i class="fas fa-map"></i> TRAÇAR ROTA NO APP</button>
        <button class="btn-google" onclick="gerarRotaGoogle()"><i class="fab fa-google"></i> ABRIR NO GOOGLE MAPS</button>
        <button onclick="limparRota()" style="background:#eee; color:#333;">LIMPAR ROTA</button>
    </div>
</div>

<div id="janela-cadastro" class="overlay">
    <button onclick="fecharOverlays()" style="background:#666; color:white;">⬅ VOLTAR</button>
    <h3 id="form-title">📍 Registrar Localização</h3>
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-lat"><input type="hidden" id="edit-lng">
    
    <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
    <input type="tel" id="whats-cliente" placeholder="WhatsApp">
    <input type="text" id="rua-cliente" placeholder="Rua">
    <input type="text" id="bairro-cliente" placeholder="Bairro">
    <input type="text" id="ref-cliente" placeholder="Referência">

    <p style="margin:10px 0 5px; font-weight:bold;">Foto da Casa:</p>
    <input type="file" id="input-foto" accept="image/*" capture="environment" onchange="previewFoto()">
    <img id="prev-foto" class="foto-preview">

    <button style="background:#6f42c1; color:white;" onclick="fazerCheckin()"><i class="fas fa-map-marker-alt"></i> ATUALIZAR LOCALIZAÇÃO</button>
    <button class="btn-save" onclick="salvarLocalizacao()">SALVAR REGISTRO</button>
</div>

<div id="janela-detalhes" class="overlay">
    <button onclick="fecharOverlays()" style="background:#666; color:white;">⬅ VOLTAR</button>
    <div id="conteudo-detalhes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBuVx3VYGHF97hU9-CSLa-FmSbxFYIH20A",
      authDomain: "mapanisia.firebaseapp.com",
      projectId: "mapanisia",
      storageBucket: "mapanisia.firebasestorage.app",
      messagingSenderId: "429106374611",
      appId: "1:429106374611:web:b0fc107917f26bec3cb126"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const map = L.map('map', { zoomControl: false }).setView([-6.0886, -35.2111], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let dadosLocais = [];
    let marcadores = [];
    let linhaRota = null;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function fecharOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

    function irPara(destino) {
        fecharOverlays(); toggleMenu();
        if(destino === 'cadastro') {
            document.getElementById('edit-id').value = '';
            document.getElementById('nome-cliente').value = '';
            document.getElementById('prev-foto').style.display = 'none';
            document.getElementById('janela-cadastro').style.display = 'block';
            fazerCheckin();
        }
    }

    function centralizarEmMim() {
        navigator.geolocation.getCurrentPosition(pos => {
            map.flyTo([pos.coords.latitude, pos.coords.longitude], 17);
        });
    }

    function previewFoto() {
        const file = document.getElementById('input-foto').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById('prev-foto').src = e.target.result;
                document.getElementById('prev-foto').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function fazerCheckin() {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('edit-lat').value = pos.coords.latitude;
            document.getElementById('edit-lng').value = pos.coords.longitude;
            alert("📍 GPS OK!");
        });
    }

    async function salvarLocalizacao() {
        const id = document.getElementById('edit-id').value;
        const fotoFile = document.getElementById('input-foto').files[0];
        const dados = {
            nome: document.getElementById('nome-cliente').value,
            whatsapp: document.getElementById('whats-cliente').value.replace(/\D/g,''),
            rua: document.getElementById('rua-cliente').value,
            bairro: document.getElementById('bairro-cliente').value,
            referencia: document.getElementById('ref-cliente').value,
            lat: parseFloat(document.getElementById('edit-lat').value),
            lng: parseFloat(document.getElementById('edit-lng').value)
        };

        if(fotoFile) {
            const ref = storage.ref(`fotos/${Date.now()}`);
            await ref.put(fotoFile);
            dados.foto = await ref.getDownloadURL();
        }

        id ? await db.collection("pontos").doc(id).update(dados) : await db.collection("pontos").add(dados);
        alert("Salvo!");
        fecharOverlays();
    }

    function carregarDados() {
        db.collection("pontos").onSnapshot(snap => {
            marcadores.forEach(m => map.removeLayer(m));
            dadosLocais = [];
            snap.forEach(doc => {
                const d = doc.data(); d.id = doc.id;
                dadosLocais.push(d);
                const marker = L.marker([d.lat, d.lng]).addTo(map).on('click', () => abrirDetalhes(d.id));
                marcadores.push(marker);
            });
        });
    }

    function abrirDetalhes(id) {
        const d = dadosLocais.find(item => item.id === id);
        document.getElementById('conteudo-detalhes').innerHTML = `
            ${d.foto ? `<img src="${d.foto}" style="width:100%; border-radius:10px;">` : ''}
            <h2>${d.nome}</h2>
            <p>${d.rua}, ${d.bairro}</p>
            <a href="https://wa.me/55${d.whatsapp}?text=Olá, sou entregador da Shopee." target="_blank" style="background:#25D366; color:white; padding:15px; display:block; text-align:center; border-radius:10px; text-decoration:none; font-weight:bold;">ZAP DO CLIENTE</a>
            <button onclick="prepararEdicao('${d.id}')" style="background:#ffc107; margin-top:10px;">EDITAR DADOS</button>
        `;
        document.getElementById('janela-detalhes').style.display = 'block';
    }

    function prepararEdicao(id) {
        const d = dadosLocais.find(item => item.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('nome-cliente').value = d.nome;
        document.getElementById('whats-cliente').value = d.whatsapp;
        document.getElementById('rua-cliente').value = d.rua;
        document.getElementById('bairro-cliente').value = d.bairro;
        document.getElementById('edit-lat').value = d.lat;
        document.getElementById('edit-lng').value = d.lng;
        if(d.foto) { document.getElementById('prev-foto').src = d.foto; document.getElementById('prev-foto').style.display = 'block'; }
        fecharOverlays();
        document.getElementById('janela-cadastro').style.display = 'block';
    }

    /* SISTEMA DE ROTEIRIZAÇÃO RESTAURADO */
    function abrirRoteirizacao() {
        toggleMenu();
        const lista = document.getElementById('lista-clientes-rota');
        lista.innerHTML = dadosLocais.map(d => `
            <div class="item-rota">
                <input type="checkbox" class="chk-rota" data-lat="${d.lat}" data-lng="${d.lng}" value="${d.id}">
                <span><strong>${d.nome}</strong><br><small>${d.bairro}</small></span>
            </div>
        `).join('');
        document.getElementById('janela-rota').style.display = 'block';
    }

    function gerarRotaGoogle() {
        const selecionados = Array.from(document.querySelectorAll('.chk-rota:checked'));
        if(selecionados.length === 0) return alert("Selecione clientes!");
        
        // Formata a URL para o Google Maps com múltiplos pontos
        const pontos = selecionados.map(s => s.getAttribute('data-lat') + ',' + s.getAttribute('data-lng')).join('/');
        window.open(`https://www.google.com/maps/dir/${pontos}`, '_blank');
    }

    function gerarRotaApp() {
        const selecionados = Array.from(document.querySelectorAll('.chk-rota:checked'));
        if(selecionados.length === 0) return alert("Selecione clientes!");
        
        if(linhaRota) map.removeLayer(linhaRota);
        
        const coordenadas = selecionados.map(s => [parseFloat(s.getAttribute('data-lat')), parseFloat(s.getAttribute('data-lng'))]);
        
        linhaRota = L.polyline(coordenadas, {color: '#6f42c1', weight: 5, opacity: 0.7, dashArray: '10, 10'}).addTo(map);
        map.fitBounds(linhaRota.getBounds());
        fecharOverlays();
        alert("🏁 Rota traçada no mapa!");
    }

    function limparRota() {
        if(linhaRota) map.removeLayer(linhaRota);
        alert("Rota limpa.");
    }

    carregarDados();
</script>
</body>
</html>
