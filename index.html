<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aGletison_app</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* MENU LATERAL CUSTOMIZADO */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #012a4a; color: white; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #013a63; text-align: center; border-bottom: 2px solid #ffc107; }
        .sidebar-content { flex: 1; padding: 10px; }
        .menu-item { padding: 15px; border-bottom: 1px solid #ffffff1a; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        /* RODAPÉ DO MENU - SUAS INFO */
        .sidebar-footer { padding: 15px; background: #011627; border-top: 1px solid #ffc107; text-align: center; }
        .my-profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ffc107; margin-bottom: 10px; object-fit: cover; }
        .footer-link { color: white; text-decoration: none; display: block; margin: 5px 0; font-size: 14px; }

        .btn-menu { position: fixed; top: 15px; left: 15px; z-index: 5000; background: #012a4a; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-size: 20px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 11000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        
        /* BOTÕES */
        button, .btn-action { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-align: center; display: block; text-decoration: none; box-sizing: border-box; }
        .btn-save { background: #25D366; color: white; }
        .btn-edit { background: #ffc107; color: black; }
        .btn-whats-client { background: #128C7E; color: white; }
        .btn-back { background: #666; color: white; }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; color:#ffc107;">aGletison_app</h2>
    </div>
    
    <div class="sidebar-content">
        <div class="menu-item" onclick="irPara('mapa')"><i class="fas fa-map-marked-alt"></i> Início</div>
        <div class="menu-item" onclick="irPara('roteirizacao')"><i class="fas fa-route"></i> Roteirização</div>
        <div class="menu-item" onclick="irPara('cadastro')"><i class="fas fa-plus-circle"></i> Novo Cadastro</div>
    </div>

    <div class="sidebar-footer">
        <img src="https://unavatar.io/instagram/Agletison" class="my-profile-img" onerror="this.src='https://via.placeholder.com/70'">
        <p style="margin:0; font-size:14px;">Desenvolvido por:</p>
        <p style="margin:0 0 10px 0; font-weight:bold; color:#ffc107;">Agletison</p>
        <a href="https://instagram.com/Agletison" target="_blank" class="footer-link"><i class="fab fa-instagram"></i> @Agletison</a>
        <a href="https://wa.me/5584987099439" target="_blank" class="footer-link"><i class="fab fa-whatsapp"></i> (84) 98709-9439</a>
        <button onclick="toggleMenu()" style="background:#cc0000; padding:5px; margin-top:10px;">FECHAR</button>
    </div>
</div>

<button class="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

<div id="map"></div>

<div id="janela-cadastro" class="overlay">
    <button class="btn-back" onclick="fecharOverlays()">⬅ VOLTAR</button>
    <h3 id="form-title" style="color:#012a4a">📍 Registrar Cliente</h3>
    <input type="hidden" id="edit-id">
    <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
    <input type="tel" id="whats-cliente" placeholder="WhatsApp (Somente números)">
    <input type="text" id="rua-cliente" placeholder="Rua">
    <input type="text" id="bairro-cliente" placeholder="Bairro">
    <input type="text" id="ref-cliente" placeholder="Referência (Opcional)">
    <button id="btn-salvar-final" class="btn-save" onclick="salvarLocalizacao()">SALVAR REGISTRO</button>
</div>

<div id="janela-detalhes" class="overlay">
    <button class="btn-back" onclick="fecharOverlays()">⬅ VOLTAR AO MAPA</button>
    <div id="conteudo-detalhes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // FIREBASE (Configuração mantida)
    const firebaseConfig = {
      apiKey: "AIzaSyBuVx3VYGHF97hU9-CSLa-FmSbxFYIH20A",
      authDomain: "mapanisia.firebaseapp.com",
      projectId: "mapanisia",
      storageBucket: "mapanisia.firebasestorage.app",
      messagingSenderId: "429106374611",
      appId: "1:429106374611:web:b0fc107917f26bec3cb126"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const map = L.map('map', { zoomControl: false }).setView([-6.0886, -35.2111], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let dadosLocais = [];
    let marcadores = [];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function fecharOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

    function irPara(destino) {
        fecharOverlays();
        toggleMenu();
        if(destino === 'cadastro') {
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "📍 Registrar Cliente";
            document.getElementById('janela-cadastro').style.display = 'block';
        }
    }

    function carregarDados() {
        db.collection("pontos").onSnapshot(snap => {
            marcadores.forEach(m => map.removeLayer(m));
            marcadores = []; dadosLocais = [];
            snap.forEach(doc => {
                const d = doc.data(); d.id = doc.id;
                dadosLocais.push(d);
                const marker = L.marker([d.lat, d.lng]).addTo(map).on('click', () => abrirDetalhes(d.id));
                marcadores.push(marker);
            });
        });
    }

    function abrirDetalhes(id) {
        const d = dadosLocais.find(item => item.id === id);
        // WHATSAPP DO CLIENTE COM MENSAGEM
        const msg = encodeURIComponent("Olá, sou entregador da Shopee.");
        const linkWhats = `https://wa.me/55${d.whatsapp}?text=${msg}`;

        document.getElementById('conteudo-detalhes').innerHTML = `
            <h2>${d.nome}</h2>
            <p><strong>📍 Rua:</strong> ${d.rua}</p>
            <p><strong>🏘️ Bairro:</strong> ${d.bairro}</p>
            <a href="${linkWhats}" target="_blank" class="btn-action btn-whats-client"><i class="fab fa-whatsapp"></i> WHATSAPP DO CLIENTE</a>
            <button class="btn-edit" onclick="prepararEdicao('${d.id}')">✏️ EDITAR LOCALIZAÇÃO</button>
        `;
        document.getElementById('janela-detalhes').style.display = 'block';
    }

    // --- CORREÇÃO DO BOTÃO EDITAR ---
    function prepararEdicao(id) {
        const d = dadosLocais.find(item => item.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('nome-cliente').value = d.nome;
        document.getElementById('whats-cliente').value = d.whatsapp;
        document.getElementById('rua-cliente').value = d.rua;
        document.getElementById('bairro-cliente').value = d.bairro;
        document.getElementById('ref-cliente').value = d.referencia || '';
        
        document.getElementById('form-title').innerText = "✏️ Editando: " + d.nome;
        fecharOverlays();
        document.getElementById('janela-cadastro').style.display = 'block';
    }

    async function salvarLocalizacao() {
        const id = document.getElementById('edit-id').value;
        const dados = {
            nome: document.getElementById('nome-cliente').value,
            whatsapp: document.getElementById('whats-cliente').value.replace(/\D/g,''),
            rua: document.getElementById('rua-cliente').value,
            bairro: document.getElementById('bairro-cliente').value,
            referencia: document.getElementById('ref-cliente').value
        };

        if(id) {
            await db.collection("pontos").doc(id).update(dados);
            alert("Dados atualizados!");
        } else {
            navigator.geolocation.getCurrentPosition(async pos => {
                dados.lat = pos.coords.latitude; dados.lng = pos.coords.longitude;
                await db.collection("pontos").add(dados);
                alert("Salvo com sucesso!");
            });
        }
        fecharOverlays();
        document.getElementById('nome-cliente').value = ''; // Limpa após salvar
    }

    carregarDados();
</script>
</body>
</html>
