<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa SpeedNET - Logística Shopee</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow-x: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; position: fixed; top: 0; }
        .container { position: relative; z-index: 2; margin-top: 55vh; padding: 15px; max-width: 450px; margin-left: auto; margin-right: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #004a8d; color: white; border: none; font-weight: bold; cursor: pointer; }
        .detalhes-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .btn-fechar { background: #666; margin-bottom: 20px; }
        .btn-salvar { background: #25D366; }
        .btn-checkin { background: #6f42c1; color: white; display: none; }
        .btn-navegar { background: #007bff; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; margin: 10px 0; text-align: center; }
        .btn-whats { background: #25D366; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; font-weight: bold; margin: 10px 0; text-align: center; }
        .btn-edit { background: #ffc107; color: #000; margin-bottom: 10px; }
        .btn-del { background: #dc3545; color: #fff; }
        .foto-detalhe { width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 2px solid #004a8d; }
        #loading { display: none; font-weight: bold; color: #004a8d; margin: 10px 0; }
        .file-label { display: block; background: #eef; border: 2px dashed #004a8d; padding: 15px; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        #file-foto { display: none; }
        .foto-preview { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
        .footer-credits { margin-top: 20px; font-size: 12px; color: #777; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="janela-detalhes" class="detalhes-overlay">
    <button class="btn-fechar" onclick="fecharDetalhes()">⬅ VOLTAR AO MAPA</button>
    <div id="conteudo-detalhes"></div>
</div>

<div id="map"></div>

<div class="container">
    <div id="identificacao-area" class="card">
        <h3>SpeedNET - Nísia Floresta</h3>
        <input type="text" id="nome-usuario" placeholder="Seu nome">
        <button onclick="acessarMapa()">ENTRAR</button>
    </div>

    <div id="app-area" class="card" style="display:none;">
        <input type="text" id="nome-busca" placeholder="🔍 Buscar cliente..." oninput="filtrarMarcadores()">
        <hr>
        <h3 id="form-title">📍 Registrar Cliente</h3>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-lat">
        <input type="hidden" id="edit-lng">
        
        <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
        <input type="tel" id="whats-cliente" placeholder="WhatsApp do Cliente (DDD + Número)">
        <input type="text" id="rua-cliente" placeholder="Rua">
        <input type="text" id="bairro-cliente" placeholder="Bairro">
        <input type="text" id="ref-cliente" placeholder="Referência">

        <label for="file-foto" class="file-label">📷 Foto (Câmera ou Galeria)
            <input type="file" id="file-foto" accept="image/*" capture="environment" onchange="previewFoto()">
        </label>
        <img id="prev-foto" class="foto-preview">

        <div id="loading">Processando... ⏳</div>
        <button id="btn-checkin" class="btn-checkin" onclick="atualizarPosicaoEdicao()">📍 ATUALIZAR LOCALIZAÇÃO (CHECK-IN)</button>
        <button id="btn-acao" class="btn-salvar" onclick="salvarLocalizacao()">SALVAR REGISTRO</button>
        <button id="btn-cancelar" style="display:none; background:#666;" onclick="cancelarEdicao()">CANCELAR</button>
        
        <div class="footer-credits">
            Criado por <strong>Abne Agletison</strong> | <a href="https://instagram.com/Agletison" target="_blank">@Agletison</a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBuVx3VYGHF97hU9-CSLa-FmSbxFYIH20A", 
      authDomain: "mapanisia.firebaseapp.com",
      projectId: "mapanisia",
      storageBucket: "mapanisia.firebasestorage.app",
      messagingSenderId: "429106374611",
      appId: "1:429106374611:web:b0fc107917f26bec3cb126"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const map = L.map('map').setView([-6.0886, -35.2111], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let marcadoresAtivos = [];
    let marcadorVoce = null;

    if (localStorage.getItem('usuario_mapa')) { acessarMapa(); }

    function acessarMapa() {
        const nome = document.getElementById('nome-usuario').value || localStorage.getItem('usuario_mapa');
        if (!nome) return alert("Digite seu nome!");
        localStorage.setItem('usuario_mapa', nome);
        document.getElementById('identificacao-area').style.display = 'none';
        document.getElementById('app-area').style.display = 'block';
        monitorarPosicao();
        carregarDados();
    }

    function monitorarPosicao() {
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            if (marcadorVoce) { marcadorVoce.setLatLng([lat, lng]); } 
            else { marcadorVoce = L.circleMarker([lat, lng], { radius: 10, fillColor: '#007bff', fillOpacity: 1, color: 'white', weight: 2 }).addTo(map); }
        }, null, { enableHighAccuracy: true });
    }

    function previewFoto() {
        const file = document.getElementById('file-foto').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('prev-foto').src = e.target.result; document.getElementById('prev-foto').style.display = 'block'; }
            reader.readAsDataURL(file);
        }
    }

    function abrirDetalhes(id) {
        db.collection("pontos").doc(id).get().then(doc => {
            const d = doc.data();
            const meuNome = localStorage.getItem('usuario_mapa');
            const linkNav = `https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}`;
            // Mensagem personalizada Shopee
            const msgWhats = encodeURIComponent(`Olá, sou ${meuNome}, Entregador da shopee.`);
            const linkWhats = `https://wa.me/55${d.whatsapp.replace(/\D/g,'')}?text=${msgWhats}`;
            
            let htmlFoto = d.foto ? `<img src="${d.foto}" class="foto-detalhe">` : '<p>(Sem foto)</p>';

            document.getElementById('conteudo-detalhes').innerHTML = `
                ${htmlFoto}
                <h2>${d.nome}</h2>
                <p><strong>📍 Endereço:</strong> ${d.rua || ''}, ${d.bairro || ''}</p>
                <p><strong>🏠 Referência:</strong> ${d.referencia || 'Nenhuma'}</p>
                <p><strong>👤 Cadastrado por:</strong> ${d.registrado_por}</p>
                
                <a href="${linkWhats}" target="_blank" class="btn-whats">💬 CHAMAR NO WHATSAPP</a>
                <a href="${linkNav}" target="_blank" class="btn-navegar">🧭 INICIAR NAVEGAÇÃO</a>
                
                <hr>
                <button class="btn-edit" onclick="prepararEdicao('${id}')">✏️ EDITAR</button>
                <button class="btn-del" onclick="excluirPonto('${id}')">🗑️ EXCLUIR</button>
            `;
            document.getElementById('janela-detalhes').style.display = 'block';
        });
    }

    function fecharDetalhes() { document.getElementById('janela-detalhes').style.display = 'none'; }

    async function salvarLocalizacao() {
        const cliente = document.getElementById('nome-cliente').value;
        const editId = document.getElementById('edit-id').value;
        const arquivo = document.getElementById('file-foto').files[0];
        if (!cliente) return alert("Nome obrigatório!");

        document.getElementById('loading').style.display = 'block';
        const dados = {
            nome: cliente, whatsapp: document.getElementById('whats-cliente').value.replace(/\D/g,''),
            rua: document.getElementById('rua-cliente').value, bairro: document.getElementById('bairro-cliente').value,
            referencia: document.getElementById('ref-cliente').value,
            registrado_por: localStorage.getItem('usuario_mapa'),
            data_atualizacao: new Date()
        };

        try {
            if (arquivo) {
                const ref = storage.ref(`fotos/${Date.now()}`);
                await ref.put(arquivo);
                dados.foto = await ref.getDownloadURL();
            }

            if (editId) {
                dados.lat = parseFloat(document.getElementById('edit-lat').value);
                dados.lng = parseFloat(document.getElementById('edit-lng').value);
                await db.collection("pontos").doc(editId).update(dados);
                alert("Atualizado!");
                cancelarEdicao();
            } else {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    dados.lat = pos.coords.latitude; dados.lng = pos.coords.longitude;
                    dados.data = new Date();
                    await db.collection("pontos").add(dados);
                    alert("Salvo com sucesso!");
                    limparFormulario();
                });
            }
        } catch (e) { alert("Erro!"); }
        document.getElementById('loading').style.display = 'none';
    }

    function carregarDados() {
        db.collection("pontos").onSnapshot(snap => {
            marcadoresAtivos.forEach(m => map.removeLayer(m.marker));
            snap.forEach(doc => {
                const d = doc.data();
                const marker = L.marker([d.lat, d.lng]).addTo(map).on('click', () => abrirDetalhes(doc.id));
                marcadoresAtivos.push({ nome: d.nome.toLowerCase(), marker });
            });
        });
    }

    function prepararEdicao(id) {
        fecharDetalhes();
        db.collection("pontos").doc(id).get().then(doc => {
            const d = doc.data();
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-lat').value = d.lat;
            document.getElementById('edit-lng').value = d.lng;
            document.getElementById('nome-cliente').value = d.nome;
            document.getElementById('whats-cliente').value = d.whatsapp || '';
            document.getElementById('rua-cliente').value = d.rua || '';
            document.getElementById('bairro-cliente').value = d.bairro || '';
            document.getElementById('ref-cliente').value = d.referencia || '';
            document.getElementById('form-title').innerText = "✏️ Editando";
            document.getElementById('btn-acao').innerText = "ATUALIZAR";
            document.getElementById('btn-checkin').style.display = "block";
            document.getElementById('btn-cancelar').style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        });
    }

    function atualizarPosicaoEdicao() {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('edit-lat').value = pos.coords.latitude;
            document.getElementById('edit-lng').value = pos.coords.longitude;
            alert("Localização capturada!");
        });
    }

    function limparFormulario() {
        document.getElementById('nome-cliente').value = '';
        document.getElementById('whats-cliente').value = '';
        document.getElementById('rua-cliente').value = '';
        document.getElementById('bairro-cliente').value = '';
        document.getElementById('ref-cliente').value = '';
        document.getElementById('file-foto').value = '';
        document.getElementById('prev-foto').style.display = 'none';
    }

    function cancelarEdicao() {
        limparFormulario();
        document.getElementById('edit-id').value = '';
        document.getElementById('form-title').innerText = "📍 Registrar Cliente";
        document.getElementById('btn-acao').innerText = "SALVAR REGISTRO";
        document.getElementById('btn-checkin').style.display = "none";
        document.getElementById('btn-cancelar').style.display = "none";
    }

    async function excluirPonto(id) {
        if (confirm("Excluir definitivamente?")) {
            await db.collection("pontos").doc(id).delete();
            fecharDetalhes();
        }
    }

    function filtrarMarcadores() {
        const busca = document.getElementById('nome-busca').value.toLowerCase();
        marcadoresAtivos.forEach(m => {
            if (m.nome.includes(busca)) { m.marker.addTo(map); } 
            else { map.removeLayer(m.marker); }
        });
    }
</script>
</body>
</html>
