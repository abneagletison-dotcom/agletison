<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aGletison_app</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* MENU LATERAL */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #012a4a; color: white; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #013a63; text-align: center; border-bottom: 2px solid #ffc107; }
        .sidebar-footer { padding: 15px; background: #011627; border-top: 1px solid #ffc107; text-align: center; }
        .my-profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #ffc107; object-fit: cover; margin-bottom: 5px; }

        /* BOTÕES FLUTUANTES */
        .btn-menu { position: fixed; top: 15px; left: 15px; z-index: 5000; background: #012a4a; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 20px; }
        .btn-locate { position: fixed; bottom: 20px; right: 20px; z-index: 5000; background: white; color: #012a4a; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }

        /* JANELAS */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 11000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        
        input, button { width: 100%; padding: 14px; margin: 6px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; font-weight: bold; }
        
        /* CORES DOS BOTÕES */
        .btn-photo { background: #013a63; color: white; border: 2px solid #ffc107; height: 60px; }
        .btn-checkin { background: #6f42c1; color: white; }
        .btn-save { background: #25D366; color: white; border: none; margin-top: 20px; }
        .btn-whats-client { background: #128C7E; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; border-radius: 10px; }
        
        .foto-preview { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin: 10px 0; display: none; border: 3px solid #013a63; }
        #loading { display: none; color: #012a4a; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header"><h2 style="margin:0; color:#ffc107;">aGletison_app</h2></div>
    <div style="flex:1; padding:10px;">
        <div onclick="irPara('mapa')" style="padding:15px; cursor:pointer;"><i class="fas fa-home"></i> Início</div>
        <div onclick="irPara('cadastro')" style="padding:15px; cursor:pointer;"><i class="fas fa-plus-circle"></i> Adicionar Localização</div>
    </div>
    <div class="sidebar-footer">
        <img src="https://unavatar.io/instagram/Agletison" class="my-profile-img" onerror="this.src='https://via.placeholder.com/70'">
        <p style="margin:0; font-weight:bold; color:#ffc107;">@Agletison</p>
        <a href="https://instagram.com/Agletison" target="_blank" style="color:white; text-decoration:none; display:block; margin:5px 0;">Instagram</a>
        <a href="https://wa.me/5584987099439" target="_blank" style="color:white; text-decoration:none; display:block;">WhatsApp</a>
        <button onclick="toggleMenu()" style="background:#cc0000; color:white; border:none; margin-top:10px;">FECHAR</button>
    </div>
</div>

<button class="btn-menu" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<button class="btn-locate" onclick="minhaLocalizacao()"><i class="fas fa-crosshairs"></i></button>

<div id="map"></div>

<div id="janela-cadastro" class="overlay">
    <button onclick="fecharOverlays()" style="background:#666; color:white;">⬅ VOLTAR</button>
    <h3 id="form-title">📍 Registro</h3>
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-lat">
    <input type="hidden" id="edit-lng">
    
    <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
    <input type="tel" id="whats-cliente" placeholder="WhatsApp (Ex: 84987099439)">
    <input type="text" id="rua-cliente" placeholder="Endereço">
    <input type="text" id="bairro-cliente" placeholder="Bairro">
    <input type="text" id="ref-cliente" placeholder="Referência">

    <p style="margin: 10px 0 5px 0; font-weight: bold; color: #012a4a;">Foto do Local:</p>
    <input type="file" id="input-foto" accept="image/*" capture="environment" style="margin-bottom: 10px;" onchange="previewFoto()">
    <img id="prev-foto" class="foto-preview">

    <button class="btn-checkin" onclick="fazerCheckin()"><i class="fas fa-map-marker-alt"></i> ATUALIZAR LOCALIZAÇÃO (CHECK-IN)</button>
    
    <div id="loading">Enviando dados... aguarde...</div>
    <button id="btn-salvar-btn" class="btn-save" onclick="salvarLocalizacao()">SALVAR TUDO</button>
</div>

<div id="janela-detalhes" class="overlay">
    <button onclick="fecharOverlays()" style="background:#666; color:white;">⬅ VOLTAR</button>
    <div id="conteudo-detalhes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBuVx3VYGHF97hU9-CSLa-FmSbxFYIH20A",
      authDomain: "mapanisia.firebaseapp.com",
      projectId: "mapanisia",
      storageBucket: "mapanisia.firebasestorage.app",
      messagingSenderId: "429106374611",
      appId: "1:429106374611:web:b0fc107917f26bec3cb126"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const map = L.map('map', { zoomControl: false }).setView([-6.0886, -35.2111], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let dadosLocais = [];
    let marcadores = [];

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function fecharOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

    function irPara(destino) {
        fecharOverlays(); toggleMenu();
        if(destino === 'cadastro') {
            document.getElementById('edit-id').value = '';
            document.getElementById('nome-cliente').value = '';
            document.getElementById('input-foto').value = '';
            document.getElementById('prev-foto').style.display = 'none';
            document.getElementById('form-title').innerText = "📍 Novo Registro";
            document.getElementById('janela-cadastro').style.display = 'block';
            fazerCheckin();
        }
    }

    function minhaLocalizacao() {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 17);
        });
    }

    function previewFoto() {
        const file = document.getElementById('input-foto').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = e => { 
                document.getElementById('prev-foto').src = e.target.result;
                document.getElementById('prev-foto').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    function fazerCheckin() {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('edit-lat').value = pos.coords.latitude;
            document.getElementById('edit-lng').value = pos.coords.longitude;
            alert("Localização capturada!");
        });
    }

    async function salvarLocalizacao() {
        const id = document.getElementById('edit-id').value;
        const fotoFile = document.getElementById('input-foto').files[0];
        const loading = document.getElementById('loading');
        
        const dados = {
            nome: document.getElementById('nome-cliente').value,
            whatsapp: document.getElementById('whats-cliente').value.replace(/\D/g,''),
            rua: document.getElementById('rua-cliente').value,
            bairro: document.getElementById('bairro-cliente').value,
            referencia: document.getElementById('ref-cliente').value,
            lat: parseFloat(document.getElementById('edit-lat').value),
            lng: parseFloat(document.getElementById('edit-lng').value)
        };

        if(!dados.nome) return alert("Digite o nome!");

        loading.style.display = 'block';

        if(fotoFile) {
            const ref = storage.ref(`fotos/${Date.now()}`);
            await ref.put(fotoFile);
            dados.foto = await ref.getDownloadURL();
        }

        if(id) {
            await db.collection("pontos").doc(id).update(dados);
        } else {
            await db.collection("pontos").add(dados);
        }
        
        loading.style.display = 'none';
        alert("Sucesso!");
        fecharOverlays();
    }

    function carregarDados() {
        db.collection("pontos").onSnapshot(snap => {
            marcadores.forEach(m => map.removeLayer(m));
            dadosLocais = [];
            snap.forEach(doc => {
                const d = doc.data(); d.id = doc.id;
                dadosLocais.push(d);
                const marker = L.marker([d.lat, d.lng]).addTo(map).on('click', () => abrirDetalhes(d.id));
                marcadores.push(marker);
            });
        });
    }

    function abrirDetalhes(id) {
        const d = dadosLocais.find(item => item.id === id);
        const linkWhats = `https://wa.me/55${d.whatsapp}?text=${encodeURIComponent("Olá, sou entregador da Shopee.")}`;
        
        document.getElementById('conteudo-detalhes').innerHTML = `
            ${d.foto ? `<img src="${d.foto}" style="width:100%; border-radius:12px;">` : '<p>Sem foto</p>'}
            <h2>${d.nome}</h2>
            <p><strong>📍 Rua:</strong> ${d.rua}</p>
            <a href="${linkWhats}" target="_blank" class="btn-whats-client"><i class="fab fa-whatsapp"></i> WHATSAPP CLIENTE</a>
            <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=$${d.lat},${d.lng}')" style="background:#007bff; color:white;">GPS GOOGLE</button>
            <button onclick="prepararEdicao('${d.id}')" style="background:#ffc107; color:black;">EDITAR / TROCAR FOTO</button>
        `;
        document.getElementById('janela-detalhes').style.display = 'block';
    }

    function prepararEdicao(id) {
        const d = dadosLocais.find(item => item.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('nome-cliente').value = d.nome;
        document.getElementById('whats-cliente').value = d.whatsapp;
        document.getElementById('rua-cliente').value = d.rua;
        document.getElementById('bairro-cliente').value = d.bairro;
        document.getElementById('ref-cliente').value = d.referencia || '';
        document.getElementById('edit-lat').value = d.lat;
        document.getElementById('edit-lng').value = d.lng;
        
        if(d.foto) {
            document.getElementById('prev-foto').src = d.foto;
            document.getElementById('prev-foto').style.display = 'block';
        }

        document.getElementById('form-title').innerText = "✏️ Editar " + d.nome;
        fecharOverlays();
        document.getElementById('janela-cadastro').style.display = 'block';
    }

    carregarDados();
</script>
</body>
</html>
